schema_version = "qm9-paper-evaluation-v1"
protocol_id = "qm9-mlp-monitoring-preflight-v1"
target_order = ["mu", "alpha", "homo", "lumo", "gap", "r2", "zpve", "u0", "u298", "h298", "g298", "cv"]
seeds = [20260717]

[splits]
kinds = ["random"]
fractions = [0.7, 0.15, 0.15]

[similarity_analysis]
method = "test-nearest-train-ECFP4-Tanimoto-fixed-strata"
edges = [0.0, 0.3, 0.6, 0.8, 1.0000001]

[external_predictions]
enabled = false
released_qm9_mist_reuse_forbidden = true

[external_predictions.expected_artifact_manifest_sha256]

[bootstrap]
method = "paired-row-percentile-bootstrap"
samples = 40
confidence = 0.95

[resource_instrumentation]
enabled = true
process_rss_method = "resource.getrusage-RUSAGE_SELF-ru_maxrss"
gpu_policy = "null-with-reason-unless-truthful-backend-telemetry"

[monitoring]
persist_mlp_learning_curves = true
fail_on_abnormal_selection = true
mlp_max_validation_normalized_mae = 0.5

[models.mlp]
enabled = true
candidates = [
  { hidden_layer_sizes = [384, 192], alpha = 0.00001, learning_rate_init = 0.001, max_iter = 80, early_stopping = true, validation_fraction = 0.1, n_iter_no_change = 10, tol = 0.0001, verbose = true },
  { hidden_layer_sizes = [768, 384], alpha = 0.00001, learning_rate_init = 0.0007, max_iter = 100, early_stopping = true, validation_fraction = 0.1, n_iter_no_change = 10, tol = 0.0001, verbose = true },
]
