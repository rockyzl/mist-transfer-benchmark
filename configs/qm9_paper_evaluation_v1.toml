schema_version = "qm9-paper-evaluation-v1"
protocol_id = "qm9-paper-evaluation-v1"
target_order = ["mu", "alpha", "homo", "lumo", "gap", "r2", "zpve", "u0", "u298", "h298", "g298", "cv"]
seeds = [20260713, 20260729, 20260811, 20260823, 20260907]

[splits]
kinds = ["random", "scaffold"]
fractions = [0.8, 0.1, 0.1]

[similarity_analysis]
method = "test-nearest-train-ECFP4-Tanimoto-fixed-strata"
edges = [0.0, 0.3, 0.6, 0.8, 1.0000001]

[external_predictions]
enabled = false
released_qm9_mist_reuse_forbidden = true

# Must contain one `split-seed` = SHA-256 entry before external mode can be enabled.
[external_predictions.expected_artifact_manifest_sha256]

[bootstrap]
method = "paired-row-percentile-bootstrap"
samples = 2000
confidence = 0.95

[models.engineered_ridge]
enabled = true
candidates = [{ alpha = 0.1 }, { alpha = 1.0 }, { alpha = 10.0 }, { alpha = 100.0 }]

[models.xgboost]
enabled = true
candidates = [
  { n_estimators = 500, max_depth = 6, learning_rate = 0.05, subsample = 0.9, colsample_bytree = 0.9 },
  { n_estimators = 900, max_depth = 8, learning_rate = 0.03, subsample = 0.85, colsample_bytree = 0.85 },
]

[models.mlp]
enabled = true
candidates = [
  { hidden_layer_sizes = [384, 192], alpha = 0.00001, learning_rate_init = 0.001, max_iter = 80, early_stopping = true },
  { hidden_layer_sizes = [768, 384], alpha = 0.00001, learning_rate_init = 0.0007, max_iter = 100, early_stopping = true },
]
